version: '2'
services:
  jackett:
    image: linuxserver/jackett
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - DNS="10.0.0.3" 
    volumes:
      - /home/alby/AppSelfHosting/ARR/jackett/:/config
      - /home/alby/Downloads/:/downloads
    ports:
      - 9117:9117
    restart: unless-stopped
  radarr:
    image: linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /home/alby/AppSelfHosting/ARR/radarr/:/config
      - /mnt/MEDIA/MOVIES/:/movies
      - /mnt/MEDIA/MOVIES/:/downloads
    links:
      - jackett:jackett
    ports:
      - 7878:7878
    restart: unless-stopped
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /home/alby/AppSelfHosting/ARR/sonarr:/config
      - /mnt/MEDIA/TVSHOWS/:/tv
      - /mnt/MEDIA/TVSHOWS/:/downloads
    links:
      - jackett:jackett
    ports:
      - 8989:8989
    restart: unless-stopped
  bazarr:
    image: linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /home/alby/AppSelfHosting/ARR/bazarr:/config
      - /mnt/MEDIA/MOVIES/:/movies
      - /mnt/MEDIA/TVSHOWS/:/tv
    ports:
      - 6767:6767
    restart: unless-stopped
  jellyseer:
    image: fallenbagel/jellyseerr
    container_name: jellyseer
    environment:
      - PUID=1000
      - PGID=1000
      - PORT=5055
      - LOG_LEVEL=debug
      - TZ=Etc/UTC
    volumes:
      - /home/alby/AppSelfHosting/ARR/Jellyseer/appdata/config:/config
      - /mnt/MEDIA/MOVIES/:/movies
      - /mnt/MEDIA/TVSHOWS/:/tv
    ports:
      - 5055:5055
    restart: unless-stopped
